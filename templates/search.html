<!DOCTYPE html>
<html>
<head>
    <title>Jellyfin Debrid Search</title>
    <style>
        body {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Consolas', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }
        .header {
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #4ec9b0;
        }
        .nav-links {
            margin-bottom: 10px;
        }
        .nav-links a {
            color: #4ec9b0;
            text-decoration: none;
            margin-right: 15px;
        }
        .nav-links a.active {
            font-weight: bold;
            text-decoration: underline;
        }

        .search-container {
            margin-bottom: 30px;
            background: #252526;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #3e3e3e;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 8px 12px;
            background: #1e1e1e;
            border: 1px solid #3e3e3e;
            color: #d4d4d4;
            border-radius: 4px;
            font-family: inherit;
        }

        select {
            padding: 8px;
            background: #1e1e1e;
            border: 1px solid #3e3e3e;
            color: #d4d4d4;
            border-radius: 4px;
            font-family: inherit;
        }

        button {
            padding: 8px 16px;
            background: #4ec9b0;
            border: none;
            color: #1e1e1e;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }

        button:hover {
            background: #3da892;
        }

        .status {
            color: #4ec9b0;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .error {
            color: #f48771;
            margin-bottom: 15px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: #252526;
            border: 1px solid #3e3e3e;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
        }

        .card.selected {
            border-color: #4ec9b0;
            box-shadow: 0 0 10px rgba(78, 201, 176, 0.3);
        }

        .card-image-container {
            width: 100%;
            height: 420px;
            background: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .poster-placeholder {
            padding: 20px;
            text-align: center;
            color: #888;
            font-style: italic;
        }

        .card-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
            color: #4ec9b0;
        }

        .badge {
            display: inline-block;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 10px;
            align-self: flex-start;
        }

        .badge.movie { background: #0e639c; color: white; }
        .badge.tv { background: #3c7d0f; color: white; }

        .card-overview {
            font-size: 12px;
            color: #a0a0a0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .release-panel {
            background: #1e1e1e;
            border-top: 1px solid #3e3e3e;
            padding: 10px;
            font-size: 12px;
            max-height: 250px;
            overflow-y: auto;
        }

        .release-status {
            color: #4ec9b0;
            text-align: center;
            padding: 10px;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #3e3e3e;
            border-top: 2px solid #4ec9b0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .release-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .release-item {
            display: grid;
            grid-template-columns: minmax(80px, 2fr) 1fr 1fr 1fr 1fr 1fr auto;
            align-items: center;
            gap: 8px;
            background: #252526;
            padding: 8px;
            border: 1px solid #3e3e3e;
            border-radius: 4px;
        }

        .release-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #d4d4d4;
        }

        .release-cached {
            color: #4ec9b0;
            font-weight: bold;
        }

        .release-uncached {
            color: #f48771;
        }

        .download-btn {
            padding: 4px 10px;
            font-size: 11px;
        }

        .download-btn:disabled {
            background: #555;
            color: #aaa;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav-links">
            <a href="/">📋 Logs</a> | <a href="/search" class="active">🔍 Search</a>
        </div>
        <h1>🔍 Jellyfin Debrid Search</h1>
    </div>

    <div class="search-container">
        <form id="search-form" style="display:flex; width: 100%; gap: 10px; margin:0;" onsubmit="performSearch(event)">
            <input type="text" id="search-query" placeholder="Search movies & TV series..." required>
            <select id="search-type">
                <option value="all">All</option>
                <option value="movie">Movies</option>
                <option value="tv">TV Series</option>
            </select>
            <button type="submit">Search</button>
        </form>
    </div>

    <div id="status-message" class="status">Enter a search query above to begin.</div>
    <div id="results-grid" class="results-grid"></div>

    <script>
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function collapseAllPanels() {
            document.querySelectorAll('.card.selected').forEach(card => {
                card.classList.remove('selected');
                const panel = card.querySelector('.release-panel');
                if (panel) panel.style.display = 'none';
            });
        }

        function handleCardClick(item, cardElement) {
            if (cardElement.classList.contains('selected')) {
                collapseAllPanels();
                return;
            }

            collapseAllPanels();

            cardElement.classList.add('selected');
            const panel = cardElement.querySelector('.release-panel');
            panel.style.display = 'block';

            const status = panel.querySelector('.release-status');
            const list = panel.querySelector('.release-list');

            // Show loading state
            status.style.display = 'flex';
            status.innerHTML = '<div class="spinner"></div>Searching for releases...';
            list.innerHTML = '';

            fetch('/api/scrapes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tmdb_id: item.id, media_type: item.media_type })
            })
            .then(res => {
                if (!res.ok) throw new Error('API error starting scrape');
                return res.json();
            })
            .then(data => {
                pollScrapeJob(data.job_id, cardElement);
            })
            .catch(err => {
                status.style.display = 'block';
                status.className = 'release-status error';
                status.textContent = 'Scrape failed: ' + err.message;
            });
        }

        function pollScrapeJob(jobId, cardElement) {
            if (!cardElement.classList.contains('selected')) {
                return; // User clicked another card, stop polling for UI updates
            }

            const panel = cardElement.querySelector('.release-panel');
            const status = panel.querySelector('.release-status');
            const list = panel.querySelector('.release-list');

            fetch(`/api/scrapes/${jobId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'running' || data.status === 'pending') {
                        status.style.display = 'flex';
                        const countText = data.count > 0 ? ' (' + String(data.count) + ' found so far)' : '';
                        status.innerHTML = '';
                        const spinner = document.createElement('div');
                        spinner.className = 'spinner';
                        status.appendChild(spinner);
                        const statusText = document.createElement('span');
                        statusText.textContent = 'Searching for releases...' + countText;
                        status.appendChild(statusText);
                        setTimeout(() => pollScrapeJob(jobId, cardElement), 2000);
                    } else if (data.status === 'complete' || data.status === 'failed') {
                        if (data.status === 'failed' && (!data.results || data.results.length === 0)) {
                            status.style.display = 'block';
                            status.className = 'release-status error';
                            status.textContent = 'Scrape failed: ' + (data.error || 'Unknown error');
                            return;
                        }

                        if (data.results && data.results.length > 0) {
                            status.style.display = 'none';
                            renderReleases(data.results, jobId, list);
                        } else {
                            status.style.display = 'block';
                            status.className = 'release-status error';
                            status.textContent = 'No releases found.';
                        }
                    }
                })
                .catch(err => {
                    status.style.display = 'block';
                    status.className = 'release-status error';
                    status.textContent = 'Failed to fetch status: ' + err.message;
                });
        }

        function renderReleases(results, jobId, panelList) {
            panelList.innerHTML = '';

            // Header row could be nice but let's stick to simple columns
            results.forEach(r => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'release-item';

                const safeRes = escapeHtml(r.resolution || 'Unknown');
                const sizeGb = r.size_gb !== undefined ? r.size_gb.toFixed(2) + ' GB' : '? GB';
                const seeders = r.seeders !== undefined ? r.seeders : '?';

                const titleDiv = document.createElement('div');
                titleDiv.className = 'release-title';
                titleDiv.title = r.title || 'Unknown';
                titleDiv.textContent = r.title || 'Unknown';
                itemDiv.appendChild(titleDiv);

                const sourceDiv = document.createElement('div');
                sourceDiv.title = 'Source';
                sourceDiv.textContent = r.source || 'Unknown';
                itemDiv.appendChild(sourceDiv);

                const sizeDiv = document.createElement('div');
                sizeDiv.title = 'Size';
                sizeDiv.textContent = sizeGb;
                itemDiv.appendChild(sizeDiv);

                const resDiv = document.createElement('div');
                resDiv.title = 'Resolution';
                resDiv.textContent = safeRes;
                itemDiv.appendChild(resDiv);

                const seedDiv = document.createElement('div');
                seedDiv.title = 'Seeders';
                seedDiv.textContent = 'P: ' + seeders;
                itemDiv.appendChild(seedDiv);

                const cachedDiv = document.createElement('div');
                if (r.cached) {
                    const cachedSpan = document.createElement('span');
                    cachedSpan.className = 'release-cached';
                    cachedSpan.title = 'Cached via ' + (r.cached_via || []).join(',');
                    cachedSpan.textContent = '\u2705 Cached';
                    cachedDiv.appendChild(cachedSpan);
                } else {
                    const uncachedSpan = document.createElement('span');
                    uncachedSpan.className = 'release-uncached';
                    uncachedSpan.textContent = '\u274C Uncached';
                    cachedDiv.appendChild(uncachedSpan);
                }
                itemDiv.appendChild(cachedDiv);

                const dlBtn = document.createElement('button');
                dlBtn.className = 'download-btn';
                dlBtn.textContent = 'Download';
                dlBtn.dataset.jobId = jobId;
                dlBtn.dataset.releaseId = r.release_id;
                dlBtn.addEventListener('click', function(event) {
                    event.stopPropagation();
                    handleDownload(this.dataset.jobId, this.dataset.releaseId, this);
                });
                itemDiv.appendChild(dlBtn);

                panelList.appendChild(itemDiv);
            });
        }

        function handleDownload(jobId, releaseId, button) {
            button.disabled = true;
            button.textContent = 'Downloading...';

            fetch(`/api/scrapes/${jobId}/downloads`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ release_id: releaseId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'started' || data.status === 'success') {
                    button.textContent = 'Started!';
                    button.style.background = '#4ec9b0';
                    button.style.color = '#1e1e1e';
                } else {
                    button.textContent = 'Error';
                    button.style.background = '#f48771';
                    button.style.color = '#1e1e1e';
                    alert(`Download failed: ${data.message || data.error || 'Unknown error'}`);
                    button.disabled = false;
                }
            })
            .catch(err => {
                button.textContent = 'Error';
                button.style.background = '#f48771';
                button.style.color = '#1e1e1e';
                alert('Request failed: ' + err.message);
                button.disabled = false;
            });
        }

        function performSearch(event) {
            if (event) {
                event.preventDefault();
            }

            const query = document.getElementById('search-query').value.trim();
            const type = document.getElementById('search-type').value;
            const statusDiv = document.getElementById('status-message');
            const gridDiv = document.getElementById('results-grid');

            if (!query) return;

            statusDiv.className = 'status';
            statusDiv.textContent = 'Searching...';
            gridDiv.innerHTML = '';

            let url = `/api/search?q=${encodeURIComponent(query)}`;
            if (type !== 'all') {
                url += `&type=${type}`;
            }

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    if (data.error) {
                        statusDiv.className = 'error';
                        statusDiv.textContent = `Error: ${data.error}`;
                        return;
                    }

                    if (!data.results || data.results.length === 0) {
                        statusDiv.className = 'status';
                        statusDiv.textContent = 'No results found.';
                        return;
                    }

                    statusDiv.textContent = `Found ${data.count} result(s).`;

                    data.results.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'card';

                        const isMovie = item.media_type === 'movie';
                        const prefix = isMovie ? 'movie-' : 'series-';

                        // RPDB free key 't0-free-rpdb'
                        const imgUrl = `https://api.ratingposterdb.com/t0-free-rpdb/tmdb/poster-default/${prefix}${item.id}.jpg?fallback=true`;

                        const yearSuffix = item.year ? ` (${item.year})` : '';
                        const title = (item.title || 'Unknown') + yearSuffix;

                        const overview = item.overview || 'No overview available.';
                        const badgeClass = isMovie ? 'movie' : 'tv';
                        const badgeText = isMovie ? 'Movie' : 'TV Series';

                        const safeTitle = escapeHtml(title);
                        const safeOverview = escapeHtml(overview);

                        card.onclick = () => handleCardClick(item, card);

                        card.innerHTML = `
                            <div class="card-image-container">
                                <img src="${imgUrl}" alt="Poster" class="card-image" onerror="this.onerror=null; this.parentNode.innerHTML='<div class=\\'poster-placeholder\\'>${safeTitle.replace(/'/g, "&#39;")}</div>';">
                            </div>
                            <div class="card-content">
                                <div class="badge ${badgeClass}">${badgeText}</div>
                                <div class="card-title">${safeTitle}</div>
                                <div class="card-overview" title="${safeOverview.replace(/"/g, '&quot;')}">${safeOverview}</div>
                            </div>
                            <div class="release-panel" style="display:none" onclick="event.stopPropagation()">
                                <div class="release-status"><div class="spinner"></div>Searching for releases...</div>
                                <div class="release-list"></div>
                            </div>
                        `;

                        gridDiv.appendChild(card);
                    });
                })
                .catch(error => {
                    console.error('Fetch error:', error);
                    statusDiv.className = 'error';
                    statusDiv.textContent = 'Failed to fetch search results. Check the console for details.';
                });
        }
    </script>
</body>
</html>
